name: Deploy to Cloudflare Workers

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Missing CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Apply D1 migrations (remote)
        run: pnpm run d1:migrate:remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare
        run: pnpm run deploy:cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Smoke test production
        run: |
          SITE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}"
          if [ -z "$SITE_URL" ]; then
            SITE_URL="https://www.headcanonforge.com"
          fi
          for path in "/" "/privacy" "/terms" "/api/auth/me" "/api/explore?page=1&limit=1"; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" "${SITE_URL}${path}")
            echo "${path} -> ${code}"
            if [ "$code" != "200" ]; then
              echo "::error::Smoke test failed for ${path} (${code})"
              exit 1
            fi
          done
          explore_body=$(curl -sS "${SITE_URL}/api/explore?page=1&limit=1")
          if echo "$explore_body" | grep -q '"user_id"'; then
            echo "::error::Explore API must not expose user_id"
            exit 1
          fi
          gen_code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "${SITE_URL}/api/generate" -H "Content-Type: application/json" -d '{}')
          echo "POST /api/generate (unauthenticated) -> ${gen_code}"
          if [ "$gen_code" != "401" ]; then
            echo "::error::Unauthenticated generate should return 401"
            exit 1
          fi
